# Rural Care Connect — Docker Compose
# Loads secrets from .env file (never committed to git)

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rcc_db
    environment:
      POSTGRES_DB: rcc_demo
      POSTGRES_USER: rcc_user
      POSTGRES_PASSWORD: rcc_secret_demo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rcc_user -d rcc_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Ollama AI ───────────────────────────────────────────────────────
  # Model: gemma4:e4b — Google Gemma 4 edge model
  # Requires Ollama 0.20.0+ (released April 3 2026 with Gemma 4 support)
  # Ubuntu local: use ollama/ollama:latest (0.20.0+)
  # GCP Xeon 8581C: use ollama/ollama:0.3.14 (avoids AMX segfault)
  ollama:
    image: ollama/ollama:latest
    container_name: rcc_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    mem_limit: 11g                  # gemma4 needs significant headroom for context
    environment:
      - OLLAMA_NUM_THREADS=6
      - OLLAMA_LLM_LIBRARY=cpu_avx2
    healthcheck:
      # Using a native bash TCP socket check to avoid curl dependency issues
      test: ["CMD-SHELL", "/bin/bash -c '</dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s           # gemma4 takes longer to load than llama3.2

  # ── Backend API ─────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: rcc_backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rcc_demo
      DB_USER: rcc_user
      DB_PASSWORD: rcc_secret_demo
      JWT_SECRET: demo_jwt_secret_change_in_prod
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: gemma4:e4b      # Matches downloaded model
      OTEL_SERVICE_NAME: RCC-care-connect
      OTEL_SERVICE_VERSION: "1.0.0"
      OTEL_RESOURCE_ATTRIBUTES: "service.name=RCC-care-connect,service.version=1.0.0,deployment.environment=production"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "rcc-backend"

  # ── Frontend (nginx + TLS) ──────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: rcc_frontend
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/rcc.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "rcc-frontend"

volumes:
  pgdata:
  ollama_models:
