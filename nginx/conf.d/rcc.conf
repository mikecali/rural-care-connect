# nginx/conf.d/rcc.conf
# Rural Care Connect — TLS, security headers, structured JSON logging

# Structured JSON access log — picked up by Elastic Agent
log_format rcc_json escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_user_agent":"$http_user_agent",'
    '"request_id":"$request_id"'
  '}';

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host:3443$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header X-Request-ID               $request_id                           always;

    server_tokens off;

    access_log /var/log/nginx/access.log rcc_json;
    error_log  /var/log/nginx/error.log  warn;

    # ── API proxy ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Connection        "";
        proxy_read_timeout    360s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_buffering off;
    }

    # ── Health check ────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:4000/health;
        access_log off;
    }

    # ── Static SPA ──────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
